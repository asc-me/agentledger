server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (AL-73). HSTS assumes TLS terminates at/above this edge.
    # frame-ancestors allows the roadmap embed to be iframed anywhere while blocking
    # the app itself from being framed elsewhere is intentionally NOT done here (the
    # embed route needs framing); clickjacking of the authed app is mitigated by the
    # SPA living on its own origin. nosniff + Referrer-Policy are unconditional.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https:" always;

    # Proxy API + health to the FastAPI service.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api:8000;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
