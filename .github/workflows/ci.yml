name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-sqlite:
    name: Backend tests (SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12 .venv
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/python -m pytest -q

  backend-postgres:
    # Proves what SQLite cannot: the full Alembic chain from empty, and the real
    # pgvector `<=>` search path (see AL-57 — ivfflat recall bug this job caught).
    name: Backend tests (Postgres + pgvector)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/agentledger_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12 .venv
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/python -m pytest -q

  frontend:
    name: Frontend tests + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Newer corepack pnpm's minimumReleaseAge policy rejects same-day packages;
      # same pin as web/Dockerfile.
      NPM_CONFIG_MINIMUM_RELEASE_AGE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json packageManager
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
